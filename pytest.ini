[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Padrão de discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções
addopts =
    -v
    --tb=short
    --strict-markers

# Marcadores customizados
markers =
    integration: testes de integração (deselect with '-m "not integration"')
    unit: testes unitários
